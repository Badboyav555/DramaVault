<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="DramaVault - Premium Drama Streaming Platform">
    <meta name="theme-color" content="#ffb6c1">
    <title>DramaVault - Premium Streaming</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- Header -->
    <header class="header" id="header">
        <div class="container header-inner">
            <a href="index.html" class="logo">
                <span class="logo-icon"></span>
                DramaVault
            </a>
            <nav class="nav" id="nav">
                <a href="index.html" class="nav-link active" data-page="home">Home</a>
                <a href="#" class="nav-link" data-category="Romance">Romance</a>
                <a href="#" class="nav-link" data-category="Drama">Drama</a>
                <a href="#" class="nav-link" data-category="Fantasy">Fantasy</a>
            </nav>
            <div class="header-actions">
                <button class="icon-btn" id="searchToggle" aria-label="Search">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
                </button>
                <button class="icon-btn" id="favoritesToggle" aria-label="Favorites">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>
                </button>
                <button class="icon-btn mobile-menu-btn" id="mobileMenuToggle" aria-label="Menu">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12h18M3 6h18M3 18h18"/></svg>
                </button>
            </div>
        </div>
    </header>

    <!-- Search Modal -->
    <div class="search-modal" id="searchModal">
        <div class="search-modal-inner">
            <input type="text" class="search-input" id="searchInput" placeholder="Search dramas by name or genre...">
            <button class="search-close" id="searchClose">&times;</button>
            <div class="search-results" id="searchResults"></div>
        </div>
    </div>

    <!-- Main Content Container -->
    <main class="main" id="mainContent">
        <!-- Dynamic Content Injected Here -->
        <div class="loader" id="initialLoader"></div>
    </main>

    <!-- Footer -->
    <footer class="footer" id="footer">
        <div class="container footer-inner">
            <div class="footer-brand">
                <h3>DramaVault</h3>
                <p>Your premium destination for exclusive drama streaming.</p>
            </div>
            <div class="footer-links">
                <div class="footer-col">
                    <h4>Browse</h4>
                    <a href="#" data-category="Romance">Romance</a>
                    <a href="#" data-category="Action">Action</a>
                    <a href="#" data-category="Fantasy">Fantasy</a>
                </div>
                <div class="footer-col">
                    <h4>Help</h4>
                    <a href="#">About Us</a>
                    <a href="#">Contact</a>
                    <a href="#">Privacy Policy</a>
                </div>
            </div>
        </div>
        <div class="footer-bottom">
            &copy; 2024 DramaVault. All rights reserved.
        </div>
    </footer>

    <script src="js/app.js"></script>
</body>
</html>
